# ${PROFILE_TITLE}
mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: true
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback:
    - tls://1.1.1.1
    - tls://8.8.8.8

proxy-providers:
  subscription:
    type: http
    url: '${PROVIDER_URL}'
    path: ./proxy_providers/provider-${SUB_ID}.txt
    interval: 3600
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true

proxy-groups:
  - name: 🎛 1. Режим работы
    type: select
    proxies:
      - 🌍 2. Выбор локации
      - 📦 Всегда через прокси
      - DIRECT
      - REJECT
      - Всё через прокси ↪️
      - В обход ↗️ (Только ПК)
      - Низкий пинг 🌀 (Не для игр)
      - Самый стабильный 🤞 (Не для игр)
      - Выбрать вручную

  - name: 🌍 2. Выбор локации
    type: select
    proxies:
      - Низкий пинг 🌀 (Не для игр)
      - Самый стабильный 🤞 (Не для игр)
      - Выбрать вручную
      - Всё через прокси ↪️

  - name: Всё через прокси ↪️
    type: select
    use:
      - subscription

  - name: В обход ↗️ (Только ПК)
    type: select
    proxies:
      - DIRECT
      - 🌍 2. Выбор локации
      - 📦 Всегда через прокси

  - name: 📦 Всегда через прокси
    type: select
    proxies:
      - 🌍 2. Выбор локации
      - Низкий пинг 🌀 (Не для игр)
      - Самый стабильный 🤞 (Не для игр)
      - Выбрать вручную

  - name: Низкий пинг 🌀 (Не для игр)
    type: url-test
    use:
      - subscription
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    lazy: true

  - name: Самый стабильный 🤞 (Не для игр)
    type: fallback
    use:
      - subscription
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    lazy: true

  - name: Выбрать вручную
    type: select
    use:
      - subscription

rule-providers:
  category-ru:
    type: http
    behavior: domain
    format: yaml
    interval: 3600
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ru.yaml
    path: ./ruleset/category-ru.yaml
  category-ads-all:
    type: http
    behavior: domain
    format: yaml
    interval: 3600
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.yaml
    path: ./ruleset/category-ads-all.yaml
  tracker:
    type: http
    behavior: domain
    format: yaml
    interval: 3600
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tracker.yaml
    path: ./ruleset/tracker.yaml
  private:
    type: http
    behavior: domain
    format: yaml
    interval: 86400
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
    path: ./ruleset/private.yaml

